# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  — INFRASTRUCTURE ONLY
#
# Runs Postgres, Redis and pgAdmin so you can develop backend + frontend
# directly in your terminal without Docker overhead.
#
# Usage:
#   docker compose up -d          # start infra
#   docker compose down           # stop infra (keeps volumes)
#   docker compose down -v        # stop + wipe volumes (fresh DB)
#
# For full production stack see docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: padma-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'           # host:5433 → container:5432
                              # Use 5433 so local Postgres (if any) on 5432 is safe
    environment:
      POSTGRES_USER: padma
      POSTGRES_PASSWORD: padma_dev_secret
      POSTGRES_DB: padma_core
    volumes:
      - padma_pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d   # creates padma_engagement DB
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U padma']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: padma-redis
    restart: unless-stopped
    ports:
      - '6380:6379'           # host:6380 → container:6379
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (DB GUI) ──────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: padma-pgadmin
    restart: unless-stopped
    ports:
      - '8081:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@padma.dev
      PGADMIN_DEFAULT_PASSWORD: padma_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - padma_pgadmin:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  padma_pgdata:
  padma_pgadmin:
